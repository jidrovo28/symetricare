{% extends "base/admin_base.html" %}
{% block title %}Configuración{% endblock %}
{% block page_title %}Configuración de la Clínica{% endblock %}

{% block content %}
<div class="row g-3 justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-header fw-700"><i class="bi bi-gear me-2"></i>Datos de la Clínica</div>
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="card-body row g-3">
          <div class="col-12">
            <label class="form-label small fw-600">Nombre de la Clínica *</label>
            <input name="nombre" class="form-control" value="{{ clinica.nombre }}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-600">RUC / NIF</label>
            <input name="ruc" class="form-control" value="{{ clinica.ruc }}">
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-600">Teléfono</label>
            <input name="telefono" class="form-control" value="{{ clinica.telefono }}">
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-600">Email</label>
            <input type="email" name="email" class="form-control" value="{{ clinica.email }}">
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-600">Ciudad</label>
            <input name="ciudad" class="form-control" value="{{ clinica.ciudad }}">
          </div>
          <div class="col-12">
            <label class="form-label small fw-600">Dirección</label>
            <textarea name="direccion" class="form-control" rows="2">{{ clinica.direccion }}</textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-600">Color principal</label>
            <input type="color" name="color_primario" class="form-control form-control-color" value="{{ clinica.color_primario }}">
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-600">Logo</label>
            <input type="file" name="logo" class="form-control" accept="image/*">
            {% if clinica.logo %}<img src="{{ clinica.logo.url }}" style="height:40px;margin-top:6px;" class="rounded">{% endif %}
          </div>
        </div>
        <div class="card-footer text-end">
          <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Guardar Configuración</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
