<form id="modalForm" action="/consultas/" onsubmit="return false">{% csrf_token %}
<input type="hidden" name="action" value="{{ action }}">
<input type="hidden" name="id" value="{{ con.pk }}">
<div class="mb-3 p-3 rounded" style="background:#f9fafb">
  <div class="d-flex justify-content-between"><span class="small">Total consulta:</span><span class="fw-600">${{ con.total|floatformat:2 }}</span></div>
  <div class="d-flex justify-content-between"><span class="small">Ya abonado:</span><span class="text-success">${{ con.abono|floatformat:2 }}</span></div>
  <div class="d-flex justify-content-between fw-600 text-danger"><span>Saldo pendiente:</span><span>${{ con.saldo|floatformat:2 }}</span></div>
</div>
<div class="mb-3">
  <label class="form-label small fw-600">Monto a abonar ($) *</label>
  <input type="number" name="monto" class="form-control form-control-sm" min="0.01" max="{{ con.saldo }}" step="0.01" value="{{ con.saldo|floatformat:2 }}" required>
</div>
<div class="mb-3">
  <label class="form-label small fw-600">Forma de pago</label>
  <select name="forma_pago" class="form-select form-select-sm">
    <option selected>Efectivo</option><option>Transferencia</option><option>Tarjeta</option>
  </select>
</div>
<div class="modal-footer px-0 pb-0">
  <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
  <button type="button" class="btn btn-success btn-sm" onclick="App.submit(document.getElementById('modalForm'),d=>{App.toast(d.msg);bootstrap.Modal.getInstance(document.getElementById('mainModal'))?.hide();location.reload();})">
    <i class="bi bi-cash me-1"></i>Registrar Abono
  </button>
</div></form>
