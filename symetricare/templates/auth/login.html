<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Symetricare — Iniciar Sesión</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{font-family:'Plus Jakarta Sans',sans-serif}
body{background:linear-gradient(135deg,#1e1b4b,#4338ca,#6366f1);min-height:100vh;display:flex;align-items:center}
.login-box{background:#fff;border-radius:1.25rem;box-shadow:0 25px 60px rgba(0,0,0,.3);padding:2.5rem;width:100%;max-width:420px}
.logo-circle{width:56px;height:56px;background:linear-gradient(135deg,#6366f1,#a78bfa);border-radius:.75rem;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem}
.form-control{border-radius:.6rem;border:1.5px solid #e5e7eb;padding:.65rem .9rem}
.form-control:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.btn-login{background:linear-gradient(135deg,#6366f1,#4f46e5);border:none;border-radius:.6rem;padding:.7rem;font-weight:600}
.btn-login:hover{background:linear-gradient(135deg,#4f46e5,#4338ca)}
</style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-8 col-md-6 col-lg-5">
      <div class="login-box">
        <div class="text-center mb-4">
          <div class="logo-circle"><i class="bi bi-heart-pulse-fill text-white fs-4"></i></div>
          <h4 class="fw-700 mb-1">Symetricare</h4>
          <p class="text-muted small">Tu bienestar, nuestra misión</p>
        </div>
        {% if error %}
        <div class="alert alert-danger py-2 small"><i class="bi bi-exclamation-circle me-1"></i>{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">{% csrf_token %}
          <div class="mb-3">
            <label class="form-label small fw-600">Usuario</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
              <input type="text" name="username" class="form-control border-start-0 ps-1" autofocus required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label small fw-600">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
              <input type="password" name="password" id="pwd" class="form-control border-start-0 ps-1" required>
              <button type="button" class="btn btn-light border" onclick="var x=document.getElementById('pwd');x.type=x.type=='password'?'text':'password'"><i class="bi bi-eye"></i></button>
            </div>
          </div>
          <button type="submit" class="btn btn-login btn-primary w-100 text-white"><i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión</button>
        </form>
        <div class="text-center mt-3">
          <a href="/" class="small text-muted text-decoration-none"><i class="bi bi-globe me-1"></i>Ver página web</a>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
